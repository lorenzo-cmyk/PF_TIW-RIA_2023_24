<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1" name="viewport">
    <title>TIW-DMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bulma@1.0.2/css/bulma.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" rel="stylesheet"/>
    <script src="assets/scripts/Authentication.js" type="module"></script>
    <link href="WEB-INF/favicon.png" rel="icon" type="image/png">
</head>

<body>
<div class="hero is-fullheight">
    <div class="hero-body">
        <div class="container is-fluid">
            <div class="columns is-vcentered">
                <div class="column is-three-fifths is-offset-one-fifth">
                    <div class="box">
                        <section class="section">
                            <h1 class="title" id="page-title">PAGE_TITLE_PLACEHOLDER</h1>
                            <article id="page-message">
                                <div class="message-body">
                                    <p id="page-message-text">
                                        PAGE_MESSAGE_PLACEHOLDER
                                    </p>
                                </div>
                            </article>
                            <form action="#" id="login-form">
                                <div class="field">
                                    <label class="label" for="login-form-username">Username</label>
                                    <div class="control has-icons-left">
                                        <input class="input" id="login-form-username" maxlength="63" minlength="1"
                                               name="username" pattern="^[a-zA-Z0-9]+$" placeholder="e.g. hi1234"
                                               required type="text">
                                        <span class="icon is-small is-left">
                                                <i class="fas fa-user"></i>
                                            </span>
                                    </div>
                                </div>
                                <div class="field">
                                    <label class="label" for="login-form-password">Password</label>
                                    <div class="control has-icons-left">
                                        <input class="input" id="login-form-password" maxlength="127" minlength="1"
                                               name="password" placeholder="e.g. ********" required type="password">
                                        <span class="icon is-small is-left">
                                                <i class="fas fa-lock"></i>
                                            </span>
                                    </div>
                                </div>
                                <div class="field">
                                    <div class="control">
                                        <button class="button is-link" id="login-form-button"
                                                type="button">Login
                                        </button>
                                    </div>
                                </div>
                            </form>
                            <form action="#" id="registration-form">
                                <div class="field">
                                    <label class="label" for="registration-form-username">Username</label>
                                    <div class="control has-icons-left">
                                        <input class="input" id="registration-form-username" maxlength="63"
                                               minlength="1" name="username" pattern="^[a-zA-Z0-9]+$"
                                               placeholder="e.g. hi1234" required type="text">
                                        <span class="icon is-small is-left">
                                                <i class="fas fa-user"></i>
                                            </span>
                                    </div>
                                </div>
                                <div class="field">
                                    <label class="label" for="registration-form-email">Email</label>
                                    <div class="control has-icons-left">
                                        <input class="input" id="registration-form-email" maxlength="63"
                                               minlength="1" name="email" placeholder="e.g. hi@mail.arpa" required
                                               type="email">
                                        <span class="icon is-small is-left">
                                                <i class="fas fa-envelope"></i>
                                            </span>
                                    </div>
                                </div>
                                <div class="field">
                                    <label class="label" for="registration-form-password">Password</label>
                                    <div class="control has-icons-left">
                                        <input class="input" id="registration-form-password" maxlength="127"
                                               minlength="1" name="password" placeholder="e.g. ********" required
                                               type="password">
                                        <span class="icon is-small is-left">
                                                <i class="fas fa-lock"></i>
                                            </span>
                                    </div>
                                </div>
                                <div class="field">
                                    <label class="label" for="registration-form-confirmPassword">Confirm
                                        Password</label>
                                    <div class="control has-icons-left">
                                        <input class="input" id="registration-form-confirmPassword" maxlength="127"
                                               minlength="1" name="confirmPassword" placeholder="e.g. ********"
                                               required type="password">
                                        <span class="icon is-small is-left">
                                                <i class="fas fa-lock"></i>
                                            </span>
                                    </div>
                                </div>
                                <div class="field">
                                    <div class="control">
                                        <button class="button is-link" id="registration-form-button"
                                                type="button">Submit
                                        </button>
                                    </div>
                                </div>
                            </form>
                            <div class="content">
                                <br>
                                <p id="page-footer-text">PAGE_FOOTER_PLACEHOLDER</p>
                            </div>
                        </section>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>

</html>
